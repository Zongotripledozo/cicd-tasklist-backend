services:
  mysql:
    image: mysql:8
    env_file:
      - .env.docker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped
    command: sh -c "npx prisma db push --accept-data-loss && node dist/server.js"
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge

volumes:
  mysql_data:
